<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3-Sort 밸런스 대시보드</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>3-Sort 밸런스 대시보드</h1>
      <p id="data-status">데이터 확인 중</p>
    </div>
    <div class="topbar-actions">
      <button id="toggle-filters" type="button" aria-expanded="false">필터 열기</button>
      <button id="reset-filters" type="button">필터 초기화</button>
    </div>
  </header>

  <section class="analysis-presets" aria-label="분석 프리셋">
    <strong>분석 프리셋</strong>
    <button class="preset active" data-preset="overview" type="button">전체 현황</button>
    <button class="preset" data-preset="real" type="button">REAL 유저</button>
    <button class="preset" data-preset="simulation" type="button">시뮬만</button>
    <button class="preset" data-preset="beginner" type="button">초급자</button>
    <button class="preset" data-preset="intermediate" type="button">중급자</button>
    <button class="preset" data-preset="advanced" type="button">상급자</button>
    <button class="preset" data-preset="failures" type="button">실패 세션</button>
    <button class="preset" data-preset="danger" type="button">위험 웨이브</button>
    <button class="preset" data-preset="system" type="button">시스템 의존</button>
    <button class="preset" data-preset="calibration" type="button">REAL vs SIM</button>
    <button class="preset" data-preset="latest" type="button">최신 스냅샷</button>
  </section>

  <section class="filters collapsed" aria-label="로그 필터">
    <label>표본<select id="filter-source"></select></label>
    <label>시뮬레이터<select id="filter-sim-version"></select></label>
    <label>밸런스 버전<select id="filter-build"></select></label>
    <label>밸런스 스냅샷<select id="filter-snapshot"></select></label>
    <label>스테이지<select id="filter-stage"></select></label>
    <label>숙련도<select id="filter-skill-profile"></select></label>
    <label>기물 조합<select id="filter-loadout"></select></label>
    <label>타입 구성<select id="filter-piece-types"></select></label>
    <label>결과<select id="filter-result"></select></label>
    <label>기기<select id="filter-device"></select></label>
  </section>

  <nav class="tabs" aria-label="대시보드 보기">
    <button class="tab active" data-view="overview" type="button">종합</button>
    <button class="tab" data-view="towers" type="button">포탑</button>
    <button class="tab" data-view="waves" type="button">웨이브</button>
    <button class="tab" data-view="perks" type="button">특전</button>
    <button class="tab" data-view="preview" type="button">사격 비교</button>
    <button class="tab" data-view="calibration" type="button">시뮬 보정</button>
    <button class="tab" data-view="diagnostics" type="button">진단</button>
    <button class="tab" data-view="versions" type="button">버전 비교</button>
    <button class="tab" data-view="sessions" type="button">세션</button>
  </nav>

  <main id="dashboard"></main>

  <template id="empty-template">
    <section class="empty-state">
      <h2>표시할 로그가 없습니다</h2>
      <p>Apps Script 배포 후 테스트 플레이를 완료하고 대시보드 갱신 파일을 다시 실행하세요.</p>
    </section>
  </template>

  <script src="../assets/data/generated/game-data.generated.js"></script>
  <script src="data/dashboard-data.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
